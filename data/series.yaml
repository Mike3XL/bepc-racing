# Series Configuration
# ---------------------
# Fixed enum of series — analytical groupings at consistent competitive levels.
# Each race belongs to exactly one series. See docs/SERIES_SYSTEM.md.

series:

  bepc-summer:
    name: BEPC Summer
    description: >
      Ballard Elks Paddle Club weekly Monday race series (May–Oct).
      Includes predecessor Salmon Bay Paddle / Rob Casey series (2015–2018).
    sort_order: 10

  sckc-duck-island:
    name: SCKC Duck Island
    description: >
      Seattle Canoe and Kayak Club Duck Island race series.
    sort_order: 20

  pnw:
    name: PNW
    description: >
      Regional races at PNW-level seriousness — PNWORCA, Sound Rowers,
      La Conner, Rat Island, Paddlers Cup, etc.
    sort_order: 30

  none:
    name: None
    description: >
      Unaffiliated / casual races (St Paddle's, one-off events).
      No index is computed or updated from these races.
    sort_order: 99


