# Manual corrections to parsed race data
# Format: list of corrections, each with reason, action, and affected files
# These are applied AFTER parsing from source (PaddleGuru, WebScorer, etc.)
# Re-run cli.py build after editing source files to regenerate.

corrections:

  - date: 2026-04-25
    race: Gig Harbor Paddlers Cup 2026
    racer: Lisi Cole
    reason: >
      PaddleGuru placed Lisi Cole in the 10K results with a time of 61:15,
      but she is a recreational SUP paddler who did the 5K (not 10K).
      A 61:15 SUP time for 10K would be world-class; for 5K it is reasonable.
      She also appeared in the 2.5K results (23:43) which is also incorrect
      if she did the 5K. Removed from both 10K and 2.5K; added to 5K.
    actions:
      - remove from: 2026-04-25__paddlerscup2026__Gig_Harbor_Paddlers_Cup_2026__10K.common.json
        original_place: 32
        original_time: "61:15"
      - remove from: 2026-04-25__paddlerscup2026__Gig_Harbor_Paddlers_Cup_2026__2_5K.common.json
        original_place: 11
        original_time: "23:43"
      - add to: 2026-04-25__paddlerscup2026__Gig_Harbor_Paddlers_Cup_2026__5K.common.json
        place: 39
        time: "61:15"
        craft: SUP
        gender: Female
