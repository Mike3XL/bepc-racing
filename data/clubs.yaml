        - ids: [386294, 386291, 386286]
          reason: Saturday sprints — flat-water sprint format, not open-water distance
        - ids: [372419, 161402, 157924, 135427]
          reason: Frostbite/Spring 2k with turn — sprint format
        - ids: [202932]
          reason: Eric Hughes Memorial Regatta — moved to pnw-regional (Green Lake open event, all small craft)
        - ids: [202613, 192105, 178411, 178403, 156775]
