  pnw-regional:
    name: PNW Small Boats Community League
    short_name: PNW League
    type: league                       # community league — no formal organizing body
    description: >
      An informal, community-curated league tracking open-water small boat racing
      across the Pacific Northwest. Includes events from PNWORCA, Sound Rowers,
      Gorge Downwind, Peter Marcus, and other regional organizers.
    homepage_url: null
    logo: null
    gh_branch: gh-pages-pnw-regional
    gh_url: https://mike3xl.github.io/bepc-racing/

    race_inclusion:
      include_organizers:
        - 90102                        # Salmon Bay Paddle (Alderbrook, Deception Pass, etc.)
        - 13754                        # Rob Casey (non-BEPC events: Deception Pass Challenge, Makah)
      include_urls: []
      exclude_urls: []
      include_patterns:
        - PNWORCA
        - "Peter Marcus"
        - "Gorge Downwind"
        - "Keats Chop"
        - "Board the Fjord"
        - "Salmon Row"
        - "Da Grind"
        - "Island Iron"
        - "SUP Challenge"
        - "Mercer Island"
        - "Sausage Pull"
        - "Rat Island"
        - "Commencement Bay"
        - "La Conner"
      exclude_patterns:
        - OC6
        - "Dragon Boat"

    handicap:
      establishment_races: 1          # only 1 race needed (racers do few events/year)
      update_faster: 0.30
      update_slower: 0.15
      carry_over: true
      carry_over_seasons: all

    display:
      season_mode: annual
      show_all_time: true             # all-time view important for league
      min_races_for_page: 3
      craft_scope:
        - Kayak-1
        - Kayak-2
        - OC-1
        - OC-2
        - SUP-1
        - V1
        - FSK-1

    contacts:
      - role: Handicap System
        name: Mike Liddell
        email: mike.liddell@gmail.com

