# PaddleClub — Club Configuration
# Each club entry defines identity, race inclusion rules, handicap settings, and display options.

# Named sites — each site is a collection of clubs published together
sites:
  pnw:
    domain: pnw.paddlerace.org
    clubs: [pnw, bepc-summer, sckc-duck-island, none]
    gh_branch: gh-pages
    gh_url: https://pnw.paddlerace.org/

clubs:

  # New series IDs (see data/series.yaml for full series definitions)
  pnw:
    name: PNW
    short_name: PNW
    type: league
    description: >
      Pacific Northwest regional races featuring long-distance open-water events
      with competitive fields. Draws racers from across Washington, British Columbia,
      and Oregon, with occasional national and international athletes. Includes
      races from several organizers including Sound Rowers and PNWORCA. Boat
      classes include surfski, HPK, OC-1/2/6, canoe, SUP, and rowing.
    organizers:
      - sound-rowers
      - pnworca
      - salmon-bay-paddle
      - ghckrt
      - coast-outdoors
      - ocean-flight
      - jericho
    handicap:
      num_races_to_establish: 2
      update_faster: 0.30
      update_slower: 0.15
      carry_over: true
  bepc-summer:
    name: BEPC Summer
    short_name: BEPC
    type: org
    description: >
      Weekly Monday-night race series at Shilshole Bay, Seattle, hosted by the
      Ballard Elks Paddle Club (BEPC) from May through September. Open to all
      craft — kayak, surfski, SUP, outrigger, rowing. Typically a ~3-mile
      open-water course with some exposure to waves and current. The field is a
      mix of social paddlers and competitive racers. This series originated as
      the Salmon Bay Paddle Monday Night series organized by Rob Casey, 2015–2018.
    organizers:
      - bepc
      - salmon-bay-paddle
    handicap:
      num_races_to_establish: 2
      update_faster: 0.30
      update_slower: 0.15
      carry_over: true
  sckc-duck-island:
    name: SCKC Duck Island
    short_name: SCKC
    type: org
    description: >
      Short-course race series at Duck Island on Green Lake, hosted by the
      Seattle Canoe and Kayak Club. Open to all craft with a focus on sprint
      kayak and canoe. Held on Friday evenings in summer. Typically a small but
      competitive field of sprint racers.
    organizers:
      - sckc
    handicap:
      num_races_to_establish: 2
      update_faster: 0.30
      update_slower: 0.15
      carry_over: true
  none:
    name: Independent
    short_name: Independent
    type: org
    description: >
      Standalone events that don't belong to a named series. Indexes are not
      computed or updated from these races because the fields and formats are
      too varied.
    organizers:
      - bepc
      - salmon-bay-paddle
      - urban-surf
      - nwmc
      - whatcom-events
    handicap:
      num_races_to_establish: 2
      update_faster: 0.30
      update_slower: 0.15
      carry_over: true

  bepc:
    name: Ballard Elks Paddle Club
    short_name: BEPC
    type: org                          # org | league
    description: >
      Weekly race series at Shilshole Bay, Ballard, organized through Ballard Elks Lodge #827.
      All craft welcome — kayak, surfski, SUP, outrigger, and more.
      Continues the tradition of the Rob Casey / Salmon Bay Paddle race series (2015–2018).
    homepage_url: https://www.ballardelks.org/paddle-club
    logo: null                         # path to logo image (future)
    gh_branch: gh-pages
    gh_url: https://pnw.paddlerace.org/

    # Where to find races and results — check in priority order
    data_sources:
      race_lists:
        - url: https://www.webscorer.com/bepc827
          notes: Primary — all BEPC races from 2019+
        - url: https://www.webscorer.com/13754
          notes: Rob Casey / Salmon Bay Paddle — early BEPC races (2015-2018) and some non-BEPC events
      fetch_sources:
        - type: webscorer_organizer
          id: bepc827
          cmd: "cli.py fetch --club bepc --year YYYY <race_ids>"
          notes: Primary BEPC organizer (Ballard Elks Paddle Club)
        - type: webscorer_organizer
          id: "13754"
          cmd: "cli.py fetch --club bepc --year YYYY <race_ids>"
          notes: Rob Casey / Salmon Bay Paddle — ran early BEPC races 2015-2018; also non-BEPC events (filter carefully)

    race_inclusion:
      include_organizers:
        - bepc827                      # Ballard Elks Paddle Club (primary)
        - 13754                        # Rob Casey (ran early BEPC races 2018)
      include_urls: []
      exclude_urls: []
      include_patterns: []
      exclude_patterns: []

    # Monday race season config — used by cli.py sync-upcoming
    monday_season:
      start: "2026-05-04"             # First Monday of season (update each year)
      end: "2026-10-26"               # Last Monday of season
      skip: []                        # Dates to skip e.g. ["2026-07-04"]
      notes: ""                       # set dynamically by month in fetcher_upcoming.py
      info_url: https://ballardelks.org/membership/ballard-elks-paddling-club-bepc/
      race_url: https://ballardelks.org/membership/ballard-elks-paddling-club-bepc/elks-monday-night-races/

    handicap:
      num_races_to_establish: 1          # ineligible for first race; eligible from race 2
      update_faster: 0.30             # weight toward new result when faster than par
      update_slower: 0.15             # weight toward new result when slower than par
      carry_over: true                # carry handicap across seasons
      carry_over_seasons: all         # how many seasons back (all | N)

    display:
      season_mode: annual             # annual | rolling_N | all_time
      show_all_time: false
      min_races_for_page: 1
      craft_scope: []                 # empty = all craft

    contacts:
      - role: Handicap System
        name: Mike Liddell
        email: mike.liddell@gmail.com

  sound-rowers:
    name: Sound Rowers
    short_name: Sound Rowers
    type: org
    description: >
      Open-water racing series in the Pacific Northwest,
      organized by the Sound Rowers paddling club.
    homepage_url: https://www.soundrowers.org
    logo: null
    gh_branch: gh-pages-sound-rowers
    gh_url: https://pnw.paddlerace.org/

    # Where to find races and results — check in priority order
    data_sources:
      race_lists:
        - url: https://www.soundrowers.org/race-results/
          notes: Primary — all Sound Rowers races with year-by-year result links
        - url: https://www.soundrowers.org/race-schedule/
          notes: Upcoming races and event names
      fetch_sources:
        - type: webscorer_organizer
          id: soundrowers
          cmd: "cli.py fetch --club sound-rowers --year YYYY <race_ids>"
          notes: Most Sound Rowers races (Commencement, Rat Island, Elk River, Shaw, Budd Inlet, Bainbridge, Sausage Pull, Squaxin, Guano Rocks)
        - type: pacificmultisports
          url: https://register.pacificmultisports.com/Events/Results
          catalog: data/sources/pacificmultisports_events.json
          cmd: "cli.py fetch-raceresult --club sound-rowers --year YYYY <rr_ids>"
          notes: La Conner (2024+), Lake Samish Salmon Row (2025+), Lake Whatcom Classic (2024+)

    race_inclusion:
      include_organizers:
        - soundrowers                  # Sound Rowers and Paddlers (primary)
      include_urls: []
      exclude_urls: []
      include_patterns: []
      exclude_patterns: []

    handicap:
      num_races_to_establish: 1
      update_faster: 0.30
      update_slower: 0.15
      carry_over: true
      carry_over_seasons: all

    display:
      season_mode: annual
      show_all_time: false
      min_races_for_page: 1
      craft_scope: []

    contacts:
      - role: Handicap System
        name: Mike Liddell
        email: mike.liddell@gmail.com

  pnw-regional:
    name: PNW Small Boats Community League
    short_name: PNW League
    type: league                       # community league — no formal organizing body
    include_clubs:
      - sound-rowers                   # all Sound Rowers races are included in PNW league
    description: >
      An informal, community-curated league tracking open-water small boat racing
      across the Pacific Northwest. Includes events from PNWORCA, Sound Rowers,
      Gorge Downwind Champs (gorgedownwindchamps.com), Peter Marcus Rough Water Race
      (organized by Bellingham Bay Outrigger Paddlers / BBOP), and other regional organizers.
    homepage_url: null
    logo: null
    gh_branch: gh-pages-pnw-regional
    gh_url: https://pnw.paddlerace.org/

    # Where to find races and results — check in priority order
    data_sources:
      race_lists:
        - url: https://register.pacificmultisports.com/Events/Results
          notes: Peter Marcus, Narrows Challenge, Gorge Downwind, BBOP, Salmon Row, La Conner, Lake Whatcom
        - url: https://www.soundrowers.org/race-results/
          notes: Sound Rowers events (Commencement, Rat Island, Elk River, Shaw, Budd Inlet, Bainbridge, Sausage Pull)
        - url: https://www.soundrowers.org/race-schedule/
          notes: Upcoming Sound Rowers events and proper race names
        - url: https://www.jerichooutrigger.com/
          notes: LAST RESORT — BC/Canadian races (Keats Chop, Chicken, Da Grind, Whipper, WUTG, FLCC, Island Iron, Canadian Nationals, Round Bowen, NPI Attack, FGPC V12) and PNWORCA Winter Series
        - url: https://www.ghckrt.com
          notes: >
            GHCKC (Gig Harbor Canoe & Kayak Racing Team) — two events relevant to PNW League:
            1. Paddlers Cup (gigharborpaddlerscup.com) — annual April event at Skansie Park, Gig Harbor.
               Inner Harbor 2.5K/5K/10K courses include surfski, SUP, OC, prone, sprint K/C.
               Results: 2025 on gigharborpaddlerscup.com/event-info/results/ (HTML table, no API).
               2018 on racehubhq.com. 2013-2017 PDFs only.
               No WebScorer/raceresult — needs custom scraper or manual import.
            2. Eric Hughes Memorial Regatta — open to all small craft at Green Lake, Seattle.
               WebScorer raceid=202932 (2019 only so far). Already in pnw-regional/2019.
               Check SCKC WebScorer for future years.
      fetch_sources:
        - type: pacificmultisports        # priority 1
          url: https://register.pacificmultisports.com/Events/Results
          catalog: data/sources/pacificmultisports_events.json
          cmd: "cli.py fetch-raceresult --club pnw-regional --year YYYY <rr_ids>"
          notes: >
            Peter Marcus Rough Water Race (org: Bellingham Bay Outrigger Paddlers / BBOP,
            race director Kevin Olney, https://www.soundrowers.org/race-schedule/bellingham-bay-rough-water-race/);
            Gorge Downwind Champs (org: gorgedownwindchamps.com, Stevenson WA);
            Narrows Challenge, BBOP events, Salmon Row, La Conner, Lake Whatcom
        - type: webscorer_direct          # priority 2
          cmd: "cli.py fetch --club pnw-regional --year YYYY <race_ids>"
          notes: >
            Sound Rowers events on WebScorer (Commencement, Rat Island, Elk River, Shaw, Budd Inlet,
            Bainbridge, Sausage Pull, Squaxin, Guano Rocks);
            PNWORCA #7/Winter Championships (org 127 — see pnworca7_webscorer map above);
            Salmon Bay Paddle (org 90102) for Alderbrook, Deception Pass etc.
        - type: jericho                   # priority 3 — last resort
          url: https://www.jerichooutrigger.com/
          cmd: "cli.py fetch-jericho --year YYYY"
          notes: BC/Canadian races only — use only when no WebScorer or raceresult source exists
          # These race name slugs are confirmed Jericho-only (no better source exists):
          accepted_slugs:
            - Chicken          # Chicken Long Solo/Relay (BC)
            - Dagrind          # Da Grind (BC)
            - Keatschop        # Keats Chop (BC)
            - Weapon           # Choose Your Weapon (BC)
            - Whipper          # Whey-Ah-Wichen Whipper (BC)
            - Wutg             # Wake Up the Gorge (BC)
            - Flcc             # FLCC Fall Small Boat Race (BC)
            - Islandironsmallboats  # Island Iron OC6 (BC)
            - Roundbowen       # Round Bowen Island (BC)
            - Npiattack        # NOPC NPI Attack (BC)
            - Supchallenge     # SUP Challenge (co-located with Da Grind)
            - Pnworca1         # PNWORCA Winter Series (OC6, no WebScorer)
            - Pnworca2
            - Pnworca3
            - Pnworca4
            - Pnworca5
            - Pnworca6
            - Pnworca7
            - PNWORCA_Winter_Series  # PNWORCA #7 2024 (named differently in Jericho)

    race_inclusion:
      include_organizers:
        - 90102                        # Salmon Bay Paddle (Alderbrook, Deception Pass, etc.)
        - 13754                        # Rob Casey (non-BEPC events: Deception Pass Challenge, Makah)
      include_urls: []
      exclude_urls: []
      include_patterns:
        - PNWORCA
        - "Peter Marcus"
        - "Gorge Downwind"
        - "Keats Chop"
        - "Board the Fjord"
        - "Salmon Row"
        - "Da Grind"
        - "Island Iron"
        - "SUP Challenge"
        - "Mercer Island"
        - "Sausage Pull"
        - "Rat Island"
        - "Commencement Bay"
        - "La Conner"
      exclude_patterns:
        - OC6
        - "Dragon Boat"
      # Races confirmed excluded (not small boats or too BC-specific):
      excluded_races:
        - slug: Gorge_V12
          reason: V12 crew race (Heat 1/2/3/4/5 format) — not small boats
        - slug: Cdnssmallboats
          reason: Canadian Nationals — mostly BC club racers, name format inconsistent with PNW data, placeholder dates
        - name: SEVENTY48
          reason: >
            70-mile Tacoma→Port Townsend endurance race (nwmaritime.org / seventy48.com).
            Results only on maprogress.com tracker — no structured data source (WebScorer/raceresult).
            Team format, most racers ineligible. Not included.
      # Known WebScorer IDs for PNWORCA #7 / Winter Championships (SPOCC-hosted, org 127):
      pnworca7_webscorer:
        2017: 96661    # 2017 PNWORCA Winter Championships
        2018: 132161   # 2018 PNWORCA Championship Race
        2019: 174420   # 2019 PNWORCA Championships: Sand Point
        2021: 236897   # 2021 PNWORCA Winter Series Race #7: Sand Point
        2022: 271793   # 2022 PNWORCA Winter Series #7 SPOCC
        2023: 310250   # 2023 PNWORCA Winter Series #7: SPOCC Championships
        2024: 347166   # 2024 PNWORCA Winter Series #7: SPOCC
        2025: 384862   # 2025 PNWORCA Winter Series #7: SPOCC
        2026: 426134   # 2026 PNWORCA Winter Series #7: SPOCC
      # Excluded from organizer 127 (relay/OC6 format):
      excluded_from_org_127:
        - 402626   # 2025 Pacific Northwest Challenge — relay format
        - 192273   # 2019 Pacific Northwest Outrigger Challenge — relay format
        - 109926   # 2017 PNW Outrigger Challenge — relay format

    handicap:
      num_races_to_establish: 1          # ineligible for first race; eligible from race 2
      update_faster: 0.30
      update_slower: 0.15
      carry_over: true
      carry_over_seasons: all

    display:
      season_mode: annual
      show_all_time: true             # all-time view important for league
      min_races_for_page: 3
      craft_scope:
        - Kayak-1
        - Kayak-2
        - OC-1
        - OC-2
        - SUP-1
        - V1
        - FSK-1

    contacts:
      - role: Handicap System
        name: Mike Liddell
        email: mike.liddell@gmail.com

