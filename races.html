  return localStorage.getItem('bepc_season') || fallback;
}
function setSeason(year) {
  localStorage.setItem('bepc_season', year);
}
function getDistance() {
  return localStorage.getItem('bepc_distance') || '';
}
function setDistance(dist) {
  if (dist) localStorage.setItem('bepc_distance', dist);
}
function getResultTab() {
  return localStorage.getItem('bepc_result_tab') || '';
}
function setResultTab(tab) {
  if (tab) localStorage.setItem('bepc_result_tab', tab);
}
function fetchData(url, cb) {
  fetch(url).then(r => r.json()).then(cb);
}

<script>
(function() {
  var ALL_CLUB_SEASONS = {"bepc":{"years":["2025", "2024", "2023", "2022", "2021", "2020", "2019", "2018", "2017", "2016", "2015"],"current":"2025"},"pnw-regional":{"years":["2026", "2025", "2024", "2023", "2022", "2021", "2020", "2019", "2018", "2017"],"current":"2026"},"sckc":{"years":["2025", "2024", "2023", "2022", "2019", "2018", "2017", "2016", "2015"],"current":"2025"},"sound-rowers":{"years":["2025", "2024", "2023", "2022"],"current":"2025"}};
  var stored = localStorage.getItem('bepc_club') || 'pnw-regional';
  if (!ALL_CLUB_SEASONS[stored]) stored = 'pnw-regional';
  document.querySelectorAll('#club-btn-group button').forEach(function(btn) {
    if (btn.dataset.club === stored) btn.classList.add('active');
    btn.addEventListener('click', function() {
      localStorage.setItem('bepc_club', btn.dataset.club);
      window.location.reload();
    });
  });
  var sel = document.getElementById('season-select');
  if (sel) {
    var info = ALL_CLUB_SEASONS[stored];
    var saved = localStorage.getItem('bepc_season');
    sel.innerHTML = info.years.map(function(y) {
      return '<option value="' + y + '"' + (y === (saved || info.current) ? ' selected' : '') + '>' + y + ' Season</option>';
    }).join('');
  }
})();
</script>

};

function podiumHtml(course) {
  var w = course.winners;
  if (!w || Object.keys(w).length === 0) return '';
  var rows = '';
  [1,2,3].forEach(function(p) {
    if (w[p]) {
      var nameHtml = RACER_SLUGS.has(w[p].slug)
        ? '<a href="racer/' + RACER_CLUB + '/' + w[p].slug + '.html" class="small text-truncate" style="max-width:130px">' + w[p].name + '</a>'
        : '<span class="small text-truncate" style="max-width:130px">' + w[p].name + '</span>';
      rows += '<div class="d-flex align-items-center gap-1 text-nowrap">' + CUP[p] + nameHtml + '</div>';
    }
  });
  var lbl = course.label ? '<div class="text-muted small fw-semibold mb-1">' + course.label + '</div>' : '';
  return '<div class="me-3">' + lbl + rows + '</div>';
}

function renderRacesList(data, year) {
  var races = (data.seasons[year] || []).slice().reverse();  // newest first
  var rows = races.map(function(r) {
    var podiums = r.courses.map(podiumHtml).join('');
    return '<tr><td class="text-muted small text-nowrap">' + r.date + '</td>'
      + '<td><a href="index.html#' + r.race_id + '">' + r.name + '</a></td>'
      + '<td class="text-muted small text-center">' + r.starters + '</td>'
      + '<td><div class="d-flex flex-wrap">' + podiums + '</div></td></tr>';
  }).join('');
  document.getElementById('races-content').innerHTML =
    '<div class="table-responsive"><table class="table table-sm table-striped">'
    + '<thead><tr><th>Date</th><th>Race</th><th class="text-center">Starters</th><th>Handicap Podium</th></tr></thead>'
    + '<tbody>' + rows + '</tbody></table></div>';
}

var _racesData = null;
function loadRacesClub(club) {
  fetchData('races-list-' + club + '.json', function(d) {
    _racesData = d;
    var yr = getSeason(d.current);
    var sel = document.getElementById('season-select');
    if (sel) sel.value = yr;
    renderRacesList(d, yr);
  });
}

document.addEventListener('DOMContentLoaded', function() {
  var club = localStorage.getItem('bepc_club') || 'pnw-regional';
  loadRacesClub(club);
  var sel = document.getElementById('season-select');
  if (sel) sel.addEventListener('change', function() {
    setSeason(this.value);
    if (_racesData) renderRacesList(_racesData, this.value);
  });
});
</script>
