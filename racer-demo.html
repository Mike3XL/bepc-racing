<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Racer Page — Concept Demo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
body { background:#f8f9fa; padding-top:1.5rem; font-family:system-ui,sans-serif; }
.racer-hero { background:linear-gradient(135deg,#1a237e 0%,#1565C0 100%); color:#fff; border-radius:16px; padding:1.75rem 2rem; margin-bottom:1.5rem; }
.racer-hero h1 { font-size:2rem; font-weight:800; margin:0 0 .2rem; }
.racer-hero .subtitle { opacity:.7; font-size:.82rem; }
.idx-badge { background:rgba(255,255,255,.15); border-radius:10px; padding:.5rem 1rem; text-align:center; }
.idx-badge .val { font-size:1.7rem; font-weight:800; line-height:1; }
.idx-badge .lbl { font-size:.6rem; opacity:.65; text-transform:uppercase; letter-spacing:.06em; }

.card { border:none; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); }
.card-body { padding:1.1rem 1.25rem; }
.sec { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:#999; margin-bottom:.6rem; }

/* result rows */
.rr { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid #f2f2f2; font-size:.78rem; }
.rr:last-child { border-bottom:none; }
.pct { font-size:.72rem; font-weight:700; padding:2px 7px; border-radius:9px; white-space:nowrap; min-width:50px; text-align:center; }
.pg { background:#E8F5E9; color:#2E7D32; }
.pr { background:#FFEBEE; color:#C62828; }
.rname { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rdate { color:#bbb; font-size:.68rem; white-space:nowrap; }

/* h2h */
.h2h-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; font-size:.75rem; }
.h2h-name { width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; font-size:.72rem; }
.h2h-bar { height:15px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:.62rem; font-weight:700; color:#fff; min-width:14px; }

/* checkboxes */
.rival-cb { display:inline-flex; align-items:center; gap:5px; margin:3px 6px 3px 0; font-size:.75rem; cursor:pointer; }
.rival-cb input { cursor:pointer; }
.rival-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
</style>
</head>
<body>
<div class="container" style="max-width:860px">

  <!-- HERO -->
  <div class="racer-hero d-flex justify-content-between align-items-start flex-wrap gap-3">
    <div>
      <div style="font-size:.65rem;opacity:.55;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem">PNW Regional · Kayak-1</div>
      <h1 id="hero-name">—</h1>
      <div class="subtitle" id="hero-sub">—</div>
    </div>
    <div class="d-flex gap-2 flex-wrap align-items-start">
      <div class="idx-badge"><div class="val" id="h-idx">—</div><div class="lbl">Index</div></div>
      <div class="idx-badge"><div class="val" id="h-races">—</div><div class="lbl">Races</div></div>
      <div class="idx-badge"><div class="val" id="h-beatpar">—</div><div class="lbl">Beat Par</div></div>
    </div>
  </div>

  <div class="row g-3 mb-3">
    <!-- INDEX TRAJECTORY -->
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-2">
            <div class="sec mb-0">Index Trajectory</div>
            <div id="rival-checks" style="line-height:1.8"></div>
          </div>
          <canvas id="traj-chart" height="140"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-3">
    <!-- BEST / WORST -->
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <div class="sec">🏆 Best Races</div>
          <div id="best-list"></div>
          <div class="sec mt-3">💀 Worst Races</div>
          <div id="worst-list"></div>
        </div>
      </div>
    </div>
    <!-- H2H -->
    <div class="col-md-8">
      <div class="card h-100">
        <div class="card-body">
          <div class="sec">Head-to-Head (indexed result)</div>
          <div id="h2h-list"></div>
          <div style="font-size:.62rem;color:#bbb;margin-top:6px">Win = better indexed result in shared race · Blue = win · Red = loss</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SEASON BAR CHART -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="sec">vs Projected — Recent Races</div>
      <canvas id="season-chart" height="90"></canvas>
    </div>
  </div>

</div>

// ── HERO ────────────────────────────────────────────────────────────────────
const valid = RD.results.filter(r => r.pct !== null && !r.fresh);
const traj = RD.results.map(r => ({ x: r.iso, y: r.index_post, race: r.race, date: r.date }));
const curIdx = RD.results[RD.results.length-1].index_post;
const beatPar = valid.filter(r => r.pct < 0).length;

document.getElementById('hero-name').textContent = RD.name;
document.getElementById('hero-sub').textContent = 'Racing since ' + RD.year_range + ' · PNW Regional · Kayak-1';
document.getElementById('h-idx').textContent = curIdx.toFixed(3);
document.getElementById('h-races').textContent = RD.results.length;
document.getElementById('h-beatpar').textContent = Math.round(beatPar/valid.length*100) + '%';

function parseDate(s) { return s; }

// ── RIVAL COLORS ─────────────────────────────────────────────────────────────
const COLORS = ['#E65100','#6A1B9A','#2E7D32','#C62828','#00695C','#F57F17'];
const rivals = RD.top_rivals;

// ── CHECKBOXES ───────────────────────────────────────────────────────────────
const checksDiv = document.getElementById('rival-checks');
rivals.forEach((name, i) => {
  const label = document.createElement('label');
  label.className = 'rival-cb';
  const short = name.split(' ').slice(-1)[0];
  label.innerHTML = `<input type="checkbox" data-rival="${name}">
    <span class="rival-dot" style="background:${COLORS[i]}"></span>
    <span>${short}</span>`;
  checksDiv.appendChild(label);
});

// ── INDEX TRAJECTORY CHART ───────────────────────────────────────────────────
const myDataset = {
  label: RD.name.split(' ').slice(-1)[0],
  data: traj,
  borderColor: '#1565C0',
  backgroundColor: 'rgba(21,101,192,.07)',
  borderWidth: 2.5,
  pointRadius: 3,
  pointHoverRadius: 6,
  fill: true,
  tension: 0.3,
  
};

const parLine = {
  label: 'Par',
  data: traj.map(p => ({ x: p.x, y: 1.0 })),
  borderColor: '#ddd',
  borderDash: [4,4],
  borderWidth: 1,
  pointRadius: 0,
  fill: false,
  
};

const trajChart = new Chart(document.getElementById('traj-chart'), {
  type: 'line',
  data: { datasets: [myDataset, parLine] },
  options: {
    responsive: true,
    interaction: { mode: 'nearest', intersect: false, axis: 'x' },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: items => {
            const d = items[0].raw;
            return d.race ? d.race + ' · ' + d.date : '';
          },
          label: ctx => {
            if (ctx.dataset.label === 'Par') return null;
            return ' ' + ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(3);
          }
        },
        filter: item => item.dataset.label !== 'Par',
      }
    },
    scales: {
      x: {
        type: 'time',
        time: { unit: 'month', displayFormats: { month: 'MMM yy' } },
        ticks: { font: { size: 10 }, maxTicksLimit: 10 },
      },
      y: {
        ticks: { font: { size: 10 } },
        title: { display: true, text: 'Index', font: { size: 10 } }
      }
    }
  }
});

// Toggle rival datasets on checkbox change
checksDiv.querySelectorAll('input[type=checkbox]').forEach((cb, i) => {
  cb.addEventListener('change', () => {
    const rival = cb.dataset.rival;
    const existing = trajChart.data.datasets.findIndex(d => d.label === rival.split(' ').slice(-1)[0]);
    if (cb.checked) {
      const rt = RD.rival_trajs[rival];
      if (!rt) return;
      trajChart.data.datasets.push({
        label: rival.split(' ').slice(-1)[0],
        data: rt.map(p => ({ x: p.iso, y: p.idx, race: p.race, date: p.date })),
        borderColor: COLORS[i],
        borderWidth: 1.8,
        pointRadius: 2,
        pointHoverRadius: 5,
        fill: false,
        tension: 0.3,
  
        borderDash: [],
      });
    } else {
      if (existing >= 0) trajChart.data.datasets.splice(existing, 1);
    }
    trajChart.update();
  });
});

// ── BEST / WORST ─────────────────────────────────────────────────────────────
function raceShort(name) {
  // Strip year prefix, shorten
  return name.replace(/^\d{4}\s+/, '').replace(/Sound Rowers[:\s]*/i,'SR: ').replace(/PNWORCA\s*/i,'ORCA ').slice(0,28);
}
function resultRow(r, good) {
  return `<div class="rr">
    <span class="pct ${good?'pg':'pr'}">${r.pct>0?'+':''}${r.pct}%</span>
    <span class="rname" title="${r.race}">${raceShort(r.race)}</span>
    <span class="rdate">${r.date.slice(-4)}</span>
  </div>`;
}
document.getElementById('best-list').innerHTML = RD.best3.map(r => resultRow(r,true)).join('');
document.getElementById('worst-list').innerHTML = RD.worst3.map(r => resultRow(r,false)).join('');

// ── H2H ──────────────────────────────────────────────────────────────────────
const h2hDiv = document.getElementById('h2h-list');
const maxTotal = Math.max(...rivals.map(n => { const d=RD.h2h[n]; return d ? d.w+d.l : 0; }));
rivals.forEach((rival, i) => {
  const d = RD.h2h[rival];
  if (!d) return;
  const total = d.w + d.l;
  const wPct = d.w / total;
  const maxBar = 180;
  const row = document.createElement('div');
  row.className = 'h2h-row';
  const wColor = wPct >= 0.5 ? '#1565C0' : '#90CAF9';
  const lColor = wPct < 0.5 ? '#C62828' : '#EF9A9A';
  const short = rival.split(' ').slice(-1)[0] + ', ' + rival.split(' ')[0];
  row.innerHTML = `
    <div class="h2h-name" title="${rival}">
      <span class="rival-dot" style="background:${COLORS[i]};margin-right:4px"></span>${short}
    </div>
    <div style="display:flex;align-items:center;gap:2px;flex:1">
      <div class="h2h-bar" style="width:${Math.round(wPct*maxBar)}px;background:${wColor}">${d.w}</div>
      <div style="font-size:.62rem;color:#ccc;width:22px;text-align:center">${total}</div>
      <div class="h2h-bar" style="width:${Math.round((1-wPct)*maxBar)}px;background:${lColor}">${d.l}</div>
    </div>
    <div style="font-size:.65rem;font-weight:700;color:${wPct>=.5?'#1565C0':'#C62828'};width:32px;text-align:right">${Math.round(wPct*100)}%</div>`;
  h2hDiv.appendChild(row);
});

// ── SEASON BAR ────────────────────────────────────────────────────────────────
const recent = valid.slice(-20);
new Chart(document.getElementById('season-chart'), {
  type: 'bar',
  data: {
    labels: recent.map(r => raceShort(r.race)),
    datasets: [{
      data: recent.map(r => r.pct),
      backgroundColor: recent.map(r => r.pct <= 0 ? 'rgba(46,125,50,.8)' : 'rgba(198,40,40,.7)'),
      borderRadius: 3,
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: {
        title: items => recent[items[0].dataIndex].race,
        label: ctx => ' ' + (ctx.parsed.y>0?'+':'') + ctx.parsed.y + '% vs projected · ' + recent[ctx.dataIndex].date
      }}
    },
    scales: {
      x: { ticks: { font: { size: 9 }, maxRotation: 40 } },
      y: { ticks: { font: { size: 10 }, callback: v => (v>0?'+':'')+v+'%' },
           grid: { color: ctx => ctx.tick.value === 0 ? '#aaa' : '#f0f0f0' } }
    }
  }
