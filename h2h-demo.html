<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Index Comparison</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
body { background:#f8f9fa; padding:1.5rem; font-family:system-ui,sans-serif; }
.card { border:none; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.08); }
.card-body { padding:1.25rem; }

/* Search */
#search-input { border-radius:8px; border:1.5px solid #dee2e6; padding:8px 12px; font-size:.85rem; width:100%; }
#search-input:focus { outline:none; border-color:#1565C0; box-shadow:0 0 0 3px rgba(21,101,192,.12); }
#suggestions { position:absolute; z-index:100; background:#fff; border:1px solid #dee2e6; border-radius:8px; width:100%; max-height:220px; overflow-y:auto; box-shadow:0 4px 16px rgba(0,0,0,.12); display:none; }
.suggestion-item { padding:8px 12px; font-size:.82rem; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
.suggestion-item:hover { background:#f0f4ff; }
.suggestion-item .race-count { font-size:.7rem; color:#aaa; }

/* Selected list */
.selected-racer { display:flex; align-items:center; gap:8px; padding:5px 8px; background:#fff; border-radius:8px; border:1px solid #e0e0e0; margin-bottom:5px; font-size:.8rem; }
.selected-racer .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.selected-racer .name { flex:1; font-weight:500; }
.selected-racer .remove { cursor:pointer; color:#bbb; font-size:1rem; line-height:1; padding:0 2px; }
.selected-racer .remove:hover { color:#C62828; }

/* Legend */
.legend-item { display:flex; align-items:center; gap:6px; font-size:.75rem; }
.legend-dot { width:12px; height:3px; border-radius:2px; }
</style>
</head>
<body>
<div class="container" style="max-width:860px">
  <div class="mb-3">
    <h5 class="mb-0">Index Trajectory Comparison</h5>
    <div class="text-muted" style="font-size:.78rem">PNW Regional · Kayak-1 · Compare your index against any racer</div>
  </div>

  <div class="row g-3">
    <!-- Left: search + selected -->
    <div class="col-md-3">
      <div class="card">
        <div class="card-body">
          <div class="mb-2" style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#999">Add Racer</div>
          <div style="position:relative">
            <input id="search-input" type="text" placeholder="Search by name…" autocomplete="off">
            <div id="suggestions"></div>
          </div>
          <div class="mt-3 mb-1" style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#999">Comparing</div>
          <div id="selected-list"></div>
        </div>
      </div>
    </div>

    <!-- Right: chart -->
    <div class="col-md-9">
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div id="legend" class="d-flex flex-wrap gap-3"></div>
          </div>
          <canvas id="chart" height="280"></canvas>
          <div style="font-size:.65rem;color:#bbb;margin-top:6px">Hover for race details · Lower index = faster relative to field</div>
        </div>
      </div>
    </div>
  </div>
</div>

 "Feb 21, 2026"}, {"iso": "2026-03-14", "idx": 0.99, "race": "2026 Peter Marcus Rough Water Race", "date": "Mar 14, 2026"}]}};

const COLORS = ['#1565C0','#E65100','#2E7D32','#6A1B9A','#C62828','#00695C','#F57F17','#37474F','#AD1457','#1B5E20'];
let colorIdx = 1; // 0 reserved for me
const selected = {}; // name -> {color, datasetIdx}

// ── CHART SETUP ──────────────────────────────────────────────────────────────
const myData = D.my_traj.map(p => ({ x: p.iso, y: p.idx, race: p.race, date: p.date }));

const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    datasets: [
      {
        label: D.me,
        data: myData,
        borderColor: COLORS[0],
        backgroundColor: COLORS[0] + '15',
        borderWidth: 2.5,
        pointRadius: 3,
        pointHoverRadius: 6,
        fill: true,
        tension: 0.3,
      },
      {
        label: '__par__',
        data: myData.map(p => ({ x: p.x, y: 1.0 })),
        borderColor: '#ddd',
        borderDash: [4,4],
        borderWidth: 1,
        pointRadius: 0,
        fill: false,
      }
    ]
  },
  options: {
    responsive: true,
    interaction: { mode: 'nearest', intersect: false, axis: 'x' },
    plugins: {
      legend: { display: false },
      tooltip: {
        filter: item => item.dataset.label !== '__par__',
        callbacks: {
          title: items => {
            const d = items[0].raw;
            return d.race ? d.race + '\n' + d.date : '';
          },
          label: ctx => ' ' + ctx.dataset.label.split(' ').slice(-1)[0] + ': ' + ctx.parsed.y.toFixed(3)
        }
      }
    },
    scales: {
      x: {
        type: 'time',
        time: { unit: 'month', displayFormats: { month: 'MMM yy' } },
        ticks: { font: { size: 10 }, maxTicksLimit: 12 }
      },
      y: {
        ticks: { font: { size: 10 } },
        title: { display: true, text: 'Index (lower = faster)', font: { size: 10 } }
      }
    }
  }
});

// ── LEGEND ────────────────────────────────────────────────────────────────────
function rebuildLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  chart.data.datasets.forEach(ds => {
    if (ds.label === '__par__') return;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${ds.borderColor};height:3px;width:20px;border-radius:2px"></div>
      <span>${ds.label.split(' ').slice(-1)[0]}</span>`;
    leg.appendChild(item);
  });
}
rebuildLegend();

// ── SELECTED LIST ─────────────────────────────────────────────────────────────
function rebuildSelectedList() {
  const list = document.getElementById('selected-list');
  list.innerHTML = '';
  // Always show "me" first, non-removable
  const meItem = document.createElement('div');
  meItem.className = 'selected-racer';
  meItem.innerHTML = `<div class="dot" style="background:${COLORS[0]}"></div>
    <div class="name">${D.me.split(' ').slice(-1)[0]}, ${D.me.split(' ')[0]} <span style="color:#aaa;font-size:.65rem">(you)</span></div>`;
  list.appendChild(meItem);

  Object.entries(selected).forEach(([name, {color}]) => {
    const item = document.createElement('div');
    item.className = 'selected-racer';
    const short = name.split(' ').slice(-1)[0] + ', ' + name.split(' ')[0];
    item.innerHTML = `<div class="dot" style="background:${color}"></div>
      <div class="name">${short}</div>
      <div class="remove" title="Remove" data-name="${name}">✕</div>`;
    item.querySelector('.remove').addEventListener('click', () => removeRacer(name));
    list.appendChild(item);
  });
}
rebuildSelectedList();

// ── ADD / REMOVE ──────────────────────────────────────────────────────────────
function addRacer(name) {
  if (selected[name] || name === D.me) return;
  const traj = D.racers[name];
  if (!traj) return;
  const color = COLORS[colorIdx % COLORS.length];
  colorIdx++;

  const dsIdx = chart.data.datasets.length;
  selected[name] = { color, dsIdx };

  chart.data.datasets.push({
    label: name,
    data: traj.map(p => ({ x: p.iso, y: p.idx, race: p.race, date: p.date })),
    borderColor: color,
    borderWidth: 2,
    pointRadius: 2,
    pointHoverRadius: 5,
    fill: false,
    tension: 0.3,
  });
  chart.update();
  rebuildLegend();
  rebuildSelectedList();
}

function removeRacer(name) {
  if (!selected[name]) return;
  const idx = chart.data.datasets.findIndex(d => d.label === name);
  if (idx >= 0) chart.data.datasets.splice(idx, 1);
  delete selected[name];
  chart.update();
  rebuildLegend();
  rebuildSelectedList();
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
const allNames = Object.keys(D.racers).sort();
const raceCounts = {};
Object.entries(D.racers).forEach(([n, traj]) => raceCounts[n] = traj.length);

const input = document.getElementById('search-input');
const sugg = document.getElementById('suggestions');

function showSuggestions(query) {
  const q = query.toLowerCase().trim();
  const matches = q.length === 0
    ? allNames.filter(n => !selected[n] && n !== D.me).slice(0, 12)
    : allNames.filter(n => n.toLowerCase().includes(q) && !selected[n] && n !== D.me).slice(0, 12);

  if (matches.length === 0) { sugg.style.display = 'none'; return; }

  sugg.innerHTML = matches.map(n => {
    const short = n.split(' ').slice(-1)[0] + ', ' + n.split(' ').slice(0,-1).join(' ');
    return `<div class="suggestion-item" data-name="${n}">
      <span>${short}</span>
      <span class="race-count">${raceCounts[n]} races</span>
    </div>`;
  }).join('');

  sugg.querySelectorAll('.suggestion-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      addRacer(el.dataset.name);
      input.value = '';
      sugg.style.display = 'none';
    });
  });
  sugg.style.display = 'block';
}

input.addEventListener('input', () => showSuggestions(input.value));
input.addEventListener('focus', () => showSuggestions(input.value));
input.addEventListener('blur', () => setTimeout(() => sugg.style.display = 'none', 150));

// Pre-add top rivals
['Egor Klevak', 'Greg Barton', 'Ivan Medvedev'].forEach(addRacer);
</script>
